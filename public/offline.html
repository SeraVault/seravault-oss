<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#667eea" />
  <title>SeraVault — You're Offline</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: rgba(102, 126, 234, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      color: #667eea;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #667eea;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    p {
      font-size: 15px;
      color: #9e9e9e;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: #667eea;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, opacity 0.2s;
      width: 100%;
    }

    .btn:hover { background: #5a6fd6; }
    .btn:active { opacity: 0.85; }

    .hint {
      margin-top: 20px;
      font-size: 13px;
      color: #616161;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 3l18 18M8.111 8.111A7 7 0 0 0 5 12c0 1.657.672 3.157 1.757 4.243M12 5a7 7 0 0 1 5.657 11.243M12 12v.01" />
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" />
      </svg>
    </div>
    <div class="logo">SeraVault</div>
    <h1>You're offline</h1>
    <p>SeraVault couldn't load because there's no internet connection. Check your network and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
    <div class="hint" id="hint">Your encrypted data is safe and waiting for you.</div>
  </div>
  <script>
    window.addEventListener('online', function () {
      document.getElementById('hint').textContent = 'Connection restored — reloading…';
      window.location.reload();
    });
  </script>
</body>
</html>
