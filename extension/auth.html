<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SeraVault – Signing in…</title>
  <style>
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      gap: 16px;
    }
    .logo { font-size: 40px; }
    .title { font-size: 18px; font-weight: 700; color: #a5b4fc; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2d2d4e;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #status { color: #94a3b8; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">🔐</div>
  <div class="title">SeraVault</div>
  <div id="spinner" class="spinner"></div>
  <div id="status">Opening sign-in window…</div>
  <script type="module" src="oauthPage.js"></script>
</body>
</html>
