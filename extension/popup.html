<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeraVault Autofill</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; overflow: hidden; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 2px; }
    /* Form inputs focus */
    input:focus { border-color: #4f46e5 !important; }
    /* Padding for unlock form */
    #root > div { padding: 24px 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
